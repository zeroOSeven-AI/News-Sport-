name: Update WBW News

on:
  schedule:
    - cron: '*/45 * * * *' # Malo pomaknuto da se ne sudara s ESPN scraperom
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 lxml Pillow requests

      - name: Run WBW Scraper
        run: python scraper_wbw.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Dodajemo generirani JSON i potencijalne slike
          git add -A
          
          # Provjera ima li promjena
          if git diff --staged --quiet; then
            echo "Nema novih WBW vijesti."
            exit 0
          fi

          git commit -m "Automated WBW update: News & Meta" || exit 0
          
          # Rebase i Push logika da izbjegnemo konflikte ako oba scrapera rade istovremeno
          for i in {1..3}; do
            git pull origin main --rebase
            if git push origin main; then
              echo "Uspješan push za WBW!"
              exit 0
            fi
            echo "Pokušaj $i propao, rebasam i čekam..."
            sleep 5
          done
          exit 1
