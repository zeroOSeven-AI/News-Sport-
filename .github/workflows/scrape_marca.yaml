name: Update Marca Football
on:
  schedule:
    - cron: '*/38 * * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml Pillow requests
          playwright install chromium

      - name: Run Marca Scraper
        run: python scraper_marca.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 🔥 KLJUČ: Dodajemo SVE (JSON i mapu sa slikama)
          git add -A
          
          # Provjera ima li promjena (da bot ne spama ako nema novih vijesti)
          if git diff --staged --quiet; then
            echo "Nema novih vijesti ni slika za Marcu."
            exit 0
          fi

          git commit -m "Automated Marca update: News + Cropped Images" || exit 0
          
          for i in {1..3}; do
            git pull origin main --rebase
            if git push origin main; then
              echo "Uspješan push za Marcu (sve datoteke)!"
              exit 0
            fi
            echo "Pokušaj $i propao, čekam 5 sekundi..."
            sleep 5
          done
          exit 1
