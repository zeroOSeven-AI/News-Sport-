name: Update ESPN Soccer
on:
  schedule:
    - cron: '*/42 * * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install beautifulsoup4 lxml Pillow requests

      - name: Run ESPN Scraper
        run: python scraper_espn.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 🔥 KLJUČ: Dodajemo SVE (JSON i slike)
          git add -A
          
          # Provjera ima li uopće promjena prije commita
          if git diff --staged --quiet; then
            echo "Nema novih vijesti ni slika."
            exit 0
          fi

          git commit -m "Automated ESPN update: News + Cropped Images" || exit 0
          
          for i in {1..3}; do
            git pull origin main --rebase
            if git push origin main; then
              echo "Uspješan push za ESPN (sve datoteke)!"
              exit 0
            fi
            echo "Pokušaj $i propao, rebasam i čekam..."
            sleep 5
          done
          exit 1
