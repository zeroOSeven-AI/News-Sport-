name: Manual Cleanup Runs
on:
  workflow_dispatch: # Ovo omogućuje gumb "Run workflow" u Actions tabu

jobs:
  delete-history:
    runs-on: ubuntu-latest
    permissions:
      actions: write # Nužno da bi skripta imala pravo brisanja
    steps:
      - name: Brisanje svih pokretanja
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 100
            });

            for (const run of runs.data.workflow_runs) {
              await github.rest.actions.deleteWorkflowRun({
                owner,
                repo,
                run_id: run.id
              });
              console.log(`Obrisano pokretanje ID: ${run.id}`);
            }
