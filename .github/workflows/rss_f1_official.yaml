name: Update F1 Official
on:
  schedule:
    - cron: '*/40 * * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run F1 Official Scraper
        # Pokreće tvoju novu asinkronu skriptu iz F1 foldera
        run: python F1/rss_f1_official.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Dodaje novonastale JSON datoteke i slike iz F1 foldera
          git add -A
          
          if git diff --staged --quiet; then
            echo "Nema promjena za commit."
            exit 0
          fi

          git commit -m "Automated update: F1 Official JSON" || exit 0
          
          # Rebase i push s ponavljanjem u slučaju konflikta s ostalim scraperima
          for i in {1..3}; do
            git pull origin main --rebase
            if git push origin main; then
              echo "Uspješan push za F1 Official!"
              exit 0
            fi
            echo "Pokušaj $i propao, čekam 5 sekundi..."
            sleep 5
          done
          exit 1