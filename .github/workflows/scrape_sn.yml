name: Update Sportske Novosti
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml Pillow requests
          playwright install chromium

      - name: Run scraper
        run: python scraper_sn.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          if [ -f sportske.json ]; then
            git add sportske.json
            # Commitamo samo ako ima promjena, inače izlazimo bez greške
            git commit -m "Automated news update" || exit 0
            
            # Retry logika: pokušaj push 3 puta u slučaju kolizije
            for i in {1..3}; do
              git pull origin main --rebase
              if git push origin main; then
                echo "Uspješan push!"
                exit 0
              fi
              echo "Pokušaj $i propao, čekam 5 sekundi..."
              sleep 5
            done
            
            echo "Nije uspjelo nakon 3 pokušaja."
            exit 1
          else
            echo "File sportske.json nije pronađen. Scraper nije uspio."
            exit 1
          fi
