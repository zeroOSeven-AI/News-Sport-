name: Update Sportske Novosti
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml Pillow requests
          playwright install chromium

      - name: Run scraper
        run: python scraper_sn.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🔥 KLJUČ: Dodajemo SVE (JSON i mapu sa slikama)
          git add -A
          
          # Provjera ima li uopće promjena (ako su vijesti iste, stani)
          if git diff --staged --quiet; then
            echo "Nema novih promjena za commit."
            exit 0
          fi

          git commit -m "Automated SN update: News + Cropped Images" || exit 0
          
          # Retry logika: pokušaj push 3 puta u slučaju kolizije s drugim scraperom
          for i in {1..3}; do
            git pull origin main --rebase
            if git push origin main; then
              echo "Uspješan push za Sportske!"
              exit 0
            fi
            echo "Pokušaj $i propao, rebasam i čekam..."
            sleep 5
          done
          
          echo "Nije uspjelo nakon 3 pokušaja."
          exit 1
