name: Update Sportske Novosti
on:
  schedule:
    - cron: '*/30 * * * *' # Pokreće se svaki puni sat
  workflow_dispatch: # Omogućuje ručno pokretanje u Actions tabu

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml
          playwright install chromium

      - name: Run scraper
        run: python scraper_sn.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # Prvo dodajemo file
          if [ -f sportske.json ]; then
            git add sportske.json
            
            # Commitamo lokalno
            git commit -m "Automated news update" || exit 0
            
            # KLJUČNI DIO: Povuci promjene s GitHub-a i stavi svoj commit na vrh
            git pull origin main --rebase
            
            # Sad šalji bez straha od sudara
            git push origin main
          else
            echo "File not found. Skipping."
            exit 1
          fi

