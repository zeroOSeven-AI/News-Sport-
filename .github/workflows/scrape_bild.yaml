name: Update Bild Sport
on:
  schedule:
    - cron: '*/30 * * * *' # Svakih 30 minuta
  workflow_dispatch: # Omogućuje ručno pokretanje

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # KLJUČNO: Daje akciji dozvolu da zapiše file u repo
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml
          playwright install chromium

      - name: Run scraper
        run: python scraper_bild.py

      - name: Commit and Push
        run: |
          # Postavljanje Git identiteta
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Provjeravamo postoji li bild.json (tako ga tvoj Python kod sada sprema)
          if [ -f bild.json ]; then
            git add bild.json
            # Commitaj samo ako ima promjena, inače nemoj srušiti workflow
            git commit -m "Automated Bild update" || echo "Nema novih promjena"
            git push
          else
            echo "Greška: bild.json nije pronađen!"
            exit 1
          fi
