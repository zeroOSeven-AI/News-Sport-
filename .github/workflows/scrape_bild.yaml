name: Update BILD Sport
on:
  schedule:
    - cron: '*/28 * * * *' # Svakih 30 minuta
  workflow_dispatch: # Omogućuje ručno pokretanje po potrebi

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dozvola za pisanje u tvoj repozitorij
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml
          playwright install chromium

      - name: Run scraper
        run: python scraper_bild.py  # Pazi da se tvoj Python file točno ovako zove

      - name: Commit and Push
        run: |
          # Postavljanje Git identiteta
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Provjeravamo postoji li bild.json
          if [ -f bild.json ]; then
            git add bild.json
            
            # Commitamo samo ako ima promjena, inače ne radimo ništa
            git commit -m "Automated BILD update" || { echo "Nema novih promjena"; exit 0; }
            
            # POVLAČIMO PROMJENE prije slanja (sprječava "rejected" grešku)
            git pull origin main --rebase
            
            # Šaljemo na server
            git push origin main
          else
            echo "Greška: bild.json nije pronađen!"
            exit 1
          fi
