name: Update Bild Sport
on:
  schedule:
    - cron: '*/35 * * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml Pillow requests
          playwright install chromium

      - name: Run Bild Scraper
        run: python scraper_bild.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # KLJUČNA PROMJENA: Dodajemo i slike i JSON
          # Koristimo -A (All) da uhvati sve nove foldere i JPG fileove
          git add -A
          
          if git diff --staged --quiet; then
            echo "Nema promjena za commit."
            exit 0
          fi

          git commit -m "Automated update: JSON + Images" || exit 0
          
          # Rebase i push s ponavljanjem u slučaju konflikta
          for i in {1..3}; do
            git pull origin main --rebase
            if git push origin main; then
              echo "Uspješan push svega!"
              exit 0
            fi
            echo "Pokušaj $i propao, čekam 5 sekundi..."
            sleep 5
          done
          exit 1
