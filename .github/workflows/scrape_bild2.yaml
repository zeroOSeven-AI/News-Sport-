name: Update Bild Sport
on:
  schedule:
    - cron: '*/35 * * * *'
  workflow_dispatch:

jobs:
  scrape_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 lxml Pillow requests
          playwright install chromium

      - name: Run Bild Scraper
        run: python scraper_bild.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f bild.json ]; then
            git add bild.json
            git commit -m "Automated Bild update" || exit 0
            
            for i in {1..3}; do
              git pull origin main --rebase
              if git push origin main; then
                echo "Uspješan push za Bild!"
                exit 0
              fi
              echo "Pokušaj $i propao, čekam 5 sekundi..."
              sleep 5
            done
            exit 1
          else
            echo "Greška: bild.json nije pronađen!"
            exit 1
          fi
